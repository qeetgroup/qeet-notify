# Local development infrastructure only — no application containers.
# Start with: docker compose -f deployments/docker-compose.dev.yml up -d
# (or `make infra-up` which aliases this file)
services:
  postgres:
    image: timescale/timescaledb:latest-pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: qeet-notify
      POSTGRES_PASSWORD: qeet-notify
      POSTGRES_DB: qeet-notify
    ports:
      - "5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  nats:
    image: nats:latest
    restart: unless-stopped
    command: ["-js", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_dev_data:/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_dev_data:/data

volumes:
  postgres_dev_data:
  nats_dev_data:
  minio_dev_data:
