image:
  registry: ghcr.io/qeetgroup
  tag: latest
  pullPolicy: IfNotPresent

replicaCount:
  api: 2
  worker: 1       # per channel
  workflow: 1
  analytics: 1
  scheduler: 1

resources:
  api:
    requests: {cpu: "100m", memory: "128Mi"}
    limits:   {cpu: "500m", memory: "512Mi"}
  worker:
    requests: {cpu: "50m",  memory: "64Mi"}
    limits:   {cpu: "250m", memory: "256Mi"}

config:
  httpPort: "8080"
  env: production
  natsURL: "nats://nats:4222"
  redisURL: "redis://redis:6379"
  s3Region: "ap-south-1"
  qeetIDIssuer: "https://api.id.qeet.in"
  otlpEndpoint: ""

# Secrets must be provided at deploy time — never commit real values.
# Use --set or a values.secret.yaml (gitignored).
secrets:
  databaseURL: ""
  encryptionKey: ""
  awsSESAccessKey: ""
  awsSESSecretKey: ""
  resendAPIKey: ""
  msg91APIKey: ""
  twoFactorKey: ""
  metaWAToken: ""
  metaWAPhoneID: ""
  metaWAVerifyToken: ""

ingress:
  enabled: false
  className: nginx
  host: notify.qeet.in
  tls: true

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
