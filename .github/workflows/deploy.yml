name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/qeetgroup/qeet-notify

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build and push all binaries
        run: |
          for binary in server worker workflow analytics migrate; do
            docker buildx build \
              --build-arg BINARY=${binary} \
              --tag ${{ env.IMAGE_PREFIX }}-${binary}:${{ github.sha }} \
              --tag ${{ env.IMAGE_PREFIX }}-${binary}:latest \
              --push \
              .
          done

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: build-push
    environment: production

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/qeet-notify
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
