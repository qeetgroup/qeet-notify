name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  GO_VERSION: "1.25"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg17
        env:
          POSTGRES_USER: qeet-notify
          POSTGRES_PASSWORD: qeet-notify
          POSTGRES_DB: qeet-notify
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U qeet-notify"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      nats:
        image: nats:2.10-alpine
        ports:
          - 4222:4222
        options: >-
          --health-cmd "nats-server --version"
          --health-interval 5s

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run migrations
        env:
          DATABASE_URL: postgres://qeet-notify:qeet-notify@localhost:5433/qeet-notify?sslmode=disable
        run: go run ./cmd/migrate up

      - name: Run unit tests
        run: go test ./... -count=1 -race -timeout 120s

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://qeet-notify:qeet-notify@localhost:5433/qeet-notify?sslmode=disable
          NATS_URL: nats://localhost:4222
          REDIS_URL: redis://localhost:6379
          ENV: test
        run: go test ./... -tags=integration -count=1 -timeout 180s

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build all binaries
        run: |
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o bin/qeet-notify-api      ./cmd/server
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o bin/qeet-notify-worker   ./cmd/worker
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o bin/qeet-notify-workflow ./cmd/workflow
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o bin/qeet-notify-sse      ./cmd/sse
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o bin/qeet-notify-analytics ./cmd/analytics
          CGO_ENABLED=0 GOOS=linux go build -ldflags="-s -w" -o bin/qeet-notify-migrate  ./cmd/migrate

      - name: Verify binaries exist
        run: ls -lh bin/
